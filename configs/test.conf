server {
    listen localhost:1027;
    server_name localhost;
    root ./www/html;

    location / {
        method GET;
        index index.html;
    }

    location /post_body {
        method POST;
        client_max_body_size 100;
    }

    location /directory {
        method GET POST;
        root ./YoupiBanane;
        index youpi.bad_extension;
        autoindex on;
        cgi_ext .bla;
        cgi_path ./tests/cgi_test;
        client_max_body_size 100g;
    }
}