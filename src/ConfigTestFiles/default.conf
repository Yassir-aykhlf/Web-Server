http {
server {
    listen 8000;
    server_name localhost example.com;

    root /var/www/html;
    index index.html index.htm;

    error_page 404 /errors/404.html;
    client_max_body_size 1000000;

    location / {
        root /var/www/html;
    }

    location /images {
        root /var/www/images;
    }

    location /cgi-bin {
        root /var/www/cgi;
        cgi_pass /usr/bin/python;
    }
}

server {
    listen 8080;
    server_name admin.localhost;

    root /var/www/admin;
    index index.html;

    error_page 403 /errors/403.html;

    location / {
        root /var/www/admin;
    }
}
}