
    # =========================================
    # SERVER 1 — Main website
    # Covers: listen, server_name, error_page,
    #         root, index, autoindex, method,
    #         redirect, location, internal
    # =========================================
    server {
        listen 8080;
        server_name www.example.com example.com;

        # Server-level defaults
        root /var/www/html;
        index index.html index.htm;
        client_max_body_size 10M;
        client_body_timeout 30;

        # Custom error pages
        error_page 404 /error/404.html;
        error_page 500 503 /error/500.html;

        # ─── Default location ─────────────────
        location / {
            method GET POST;
            autoindex off;
        }

        # ─── About page, autoindex on ─────────
        location /about {
            root /var/www/html/about;
            index index.html;
            method GET;
            autoindex on;
        }

        # ─── Redirect old URL to new URL ──────
        location /old-blog {
            redirect 301 /blog;
        }

        # ─── Redirect with just a status ──────
        location /moved {
            redirect 302;
        }

        # ─── Internal error pages ─────────────
        #     Only accessible internally,
        #     not directly by the client
        location /error {
            root /var/www/html/errors;
            method GET;
            internal;
        }

        # ─── Static assets ────────────────────
        location /static {
            root /var/www/static;
            method GET;
            autoindex off;
        }
    }

    # =========================================
    # SERVER 2 — API server
    # Covers: CGI (cgi_ext, cgi_path,
    #         cgi_timeout), uploads
    #         (upload_store), multiple methods
    # =========================================
    server {
        listen 8081;
        server_name api.example.com;

        root /var/www/api;
        index index.php;
        client_max_body_size 50M;
        client_body_timeout 60;

        error_page 404 /errors/404.html;
        error_page 500 /errors/500.html;

        # ─── PHP CGI endpoint ─────────────────
        location /api {
            method GET POST DELETE;
            cgi_ext .php;
            cgi_path /usr/bin/php-cgi;
            cgi_timeout 10;
            autoindex off;
        }

        # ─── Python CGI endpoint ──────────────
        location /scripts {
            method GET POST;
            cgi_ext .py;
            cgi_path /usr/bin/python3;
            cgi_timeout 30;
            autoindex off;
        }

        # ─── Multiple CGI extensions ──────────
        location /cgi-bin {
            method GET POST;
            cgi_ext .php .py .pl;
            cgi_path /usr/bin/php-cgi /usr/bin/python3 /usr/bin/perl;
            cgi_timeout 15;
            autoindex off;
        }

        # ─── File upload endpoint ─────────────
        location /upload {
            method POST;
            upload_store /var/www/uploads;
            client_max_body_size 100M;
            client_body_timeout 120;
            autoindex off;
        }

        # ─── Internal error pages ─────────────
        location /errors {
            root /var/www/api/errors;
            method GET;
            internal;
        }
    }

    # =========================================
    # SERVER 3 — File hosting / downloads
    # Covers: autoindex on, upload + download,
    #         location-level overrides,
    #         multiple index files
    # =========================================
    server {
        listen 8082;
        server_name files.example.com;

        root /var/www/files;
        index index.html;
        client_max_body_size 200M;
        client_body_timeout 180;

        error_page 404 /pages/404.html;
        error_page 403 /pages/403.html;
        error_page 500 /pages/500.html;

        # ─── Root — directory listing on ──────
        location / {
            method GET;
            autoindex on;
        }

        # ─── Public downloads ─────────────────
        location /downloads {
            root /var/www/files/downloads;
            method GET;
            autoindex on;
            index index.html README.html;
        }

        # ─── User uploads ─────────────────────
        location /upload {
            method POST;
            upload_store /var/www/files/user-uploads;
            client_max_body_size 500M;
            client_body_timeout 300;
            autoindex off;
        }

        # ─── Browse user uploads ──────────────
        location /browse {
            root /var/www/files/user-uploads;
            method GET;
            autoindex on;
        }

        # ─── Redirect old download links ──────
        location /dl {
            redirect 301 /downloads;
        }

        # ─── Internal pages ───────────────────
        location /pages {
            root /var/www/files/pages;
            method GET;
            internal;
        }
    }

    # =========================================
    # SERVER 4 — Dev / test server
    # Covers: everything together in one place,
    #         useful for testing during eval
    # =========================================
    server {
        listen 9090;
        server_name localhost dev.local;

        root /var/www/dev;
        index index.html index.php;
        client_max_body_size 20M;
        client_body_timeout 60;

        error_page 404 /err/404.html;
        error_page 403 /err/403.html;
        error_page 500 /err/500.html;

        # ─── Homepage ─────────────────────────
        location / {
            method GET;
            autoindex on;
        }

        # ─── CGI test ─────────────────────────
        location /cgi-test {
            method GET POST;
            cgi_ext .php .py;
            cgi_path /usr/bin/php-cgi /usr/bin/python3;
            cgi_timeout 10;
            autoindex off;
        }

        # ─── Upload test ──────────────────────
        location /upload-test {
            method POST;
            upload_store /var/www/dev/test-uploads;
            client_max_body_size 10M;
            autoindex off;
        }

        # ─── Autoindex test ───────────────────
        location /browse {
            root /var/www/dev/browse;
            method GET;
            autoindex on;
        }

        # ─── Redirect test ────────────────────
        location /old {
            redirect 301 /;
        }

        # ─── Internal error pages ─────────────
        location /err {
            root /var/www/dev/errors;
            method GET;
            internal;
        }
    }
