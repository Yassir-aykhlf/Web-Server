    # Server 1
    server {
        listen 8080;  
        # Interface:port pair → server listens on port 8080 (default interface: 0.0.0.0)

        server_name example.com www.example.com;
        # Multiple hostnames (virtual hosts) mapped to the same server
        # Duplicate names are allowed and ignored internally

        root /var/www/site1;
        # Default filesystem root for this server
        # Used when a location block does NOT define its own root

        # Default error pages
        error_page 404 /errors/404.html;
        error_page 500 /errors/500.html;
        # Mapping HTTP error codes to static files
        # Paths are resolved relative to the server root unless absolute

        # Max client body size
        client_max_body_size 1048576; # 1MB
        # Reject requests with body size greater than this value (413 error)

        # Root location /
        location / {
            index index.html index.php;
            # Ordered list of index files
            # First existing file is served
            # Duplicates are allowed but redundant

            autoindex off;
            # If no index file exists:
            # off → return 403 Forbidden
            # on  → generate directory listing

            # Only GET and POST are allowed
            # Other methods return 405 Method Not Allowed
            # Duplicates in method list are allowed but ignored
        }

        # Admin panel
        location /admin {
            root /var/www/admin;
            # Overrides server root for this location only

            index admin.html;
            # Index file specific to /admin

            autoindex on;
            # If no index file exists, server generates HTML directory listing

            # Only GET allowed for admin resources
        }

        # File uploads
        location /upload {
            root /var/www/uploads;

            upload_store /var/www/uploads/files;

        }

        # Redirection
        location /old {
            return 301 /new;
            # Immediate HTTP redirection
            # No filesystem access occurs for this location
        }
    }

    # Server 2
    server {
        listen 127.0.0.1:8000;
        # This server listens on port 8000

        server_name test.local localhost;
        # Multiple hostnames mapped to the same port

        root /var/www/site2;
        # Default root for this server

        location / {
            index main.html;
            autoindex off;
        }

        location /images {
            root /var/www/media;
            # Overrides server root for /images

            index index.html index.htm;
            # Ordered list of index files

            autoindex on;
            # Directory listing enabled if no index file exists

            method GET;
        }
    }

    # Server 3 (minimal/base case)
    server {
        listen 9000;
        # Minimal server listening on port 9000

        server_name minimal.local;
        # Single hostname

        root /var/www/minimal;
        # Server root

        # No locations specified:
        # All requests use server-level defaults
        # Default index: index.html
        # Default autoindex: off
        # Default allowed method: GET
    }


