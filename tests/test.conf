server {
    listen 9080;
    server_name localhost;
    root ./www/html;
    error_page 400 /errors/400.html;
    error_page 403 /errors/403.html;
    error_page 404 /errors/404.html;
    error_page 405 /errors/405.html;
    error_page 413 /errors/413.html;
    error_page 500 /errors/500.html;
    client_max_body_size 1m;

    location / {
        method GET POST;
        index index.html;
        autoindex off;
    }

    location /upload {
        method GET POST DELETE;
        upload_store ./www1/uploads;
        autoindex on;
    }

    location /cgi-bin {
        method GET POST;
        root ./www;
        cgi_ext .py .sh;
        cgi_path /usr/bin/python3;
    }

    location /redirect {
        return 301 http://localhost:9080/;
    }

    location /autoindex {
        root ./www;
        autoindex on;
    }

    location /getonly {
        method GET;
        root ./www/html;
        index index.html;
    }
}

server {
    listen 9081;
    server_name localhost;
    root ./www/html;
    error_page 404 /errors/404.html;
    client_max_body_size 5m;

    location / {
        method GET;
        index index.html;
        autoindex off;
    }
}
